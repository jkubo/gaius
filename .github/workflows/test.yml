name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest
          pip install -e ".[mcp,http]"   # gaius entrypoint + mcp/fastapi for the attribution tests

      - name: Install semantic extras (optional — skip if unavailable)
        run: pip install "sentence-transformers>=2.7" "sqlite-vec>=0.1" || true

      - name: Run tests
        env:
          GAIUS_CONFIG: /dev/null
        run: pytest tests/ -v --tb=short

      - name: Run injection benchmark (bundled demo corpus)
        run: python benchmarks/bench_inject.py

      - name: Check for hardcoded deployment paths in shipped code
        run: |
          # Hardcoded absolute home paths and specific production domains must not appear
          # in shipped Python source. Config-driven substitutes belong in ~/.gaius/config.yaml.
          INTERNAL="/home/[a-z]+/|kub0\.net|ansible\.venv"
          SOURCES="gaius/ http_adapter.py gaius_cli presets/"
          if grep -rE "$INTERNAL" $SOURCES --include="*.py" --include="*.yaml" --include="*.yml"; then
            echo "FAIL: hardcoded deployment paths found in shipped code"
            exit 1
          fi
          echo "OK: no hardcoded paths found"
